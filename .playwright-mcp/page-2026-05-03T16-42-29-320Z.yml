        - text: ", and install it."
      - paragraph [ref=e57]:
        - text: "Second, add an empty tunnel:"
        - img "WireGuard add tunnel screen on Windows" [ref=e58]
        - text: This should automatically generate a
        - code [ref=e59]: Private key
        - text: and
        - code [ref=e60]: Public Key
        - text: .
      - paragraph [ref=e61]:
        - text: "Third, fill your configuration file with the following:"
        - text: Remeber to not overwrite the
        - code [ref=e62]: Private Key
        - text: .
      - strong [ref=e63]: "Config:"
      - generic [ref=e64]: "[Interface] PrivateKey = # Auto-Generated Private Key. Don't overwrite this line. Address = 10.0.0.X/32 # Where \"X\" = Address given by Bread or Carson DNS = 10.0.0.1 # Use Gigachad DNS (optional) [Peer] PublicKey = y8+He4nBEAiVcjsxzP70qwfgJlkcs7g8LcWWQfi6nEE= AllowedIPs = 0.0.0.0/1, 128.0.0.0/1 Endpoint = 192.3.251.174:51820 PersistentKeepalive = 20"
      - paragraph [ref=e65]:
        - text: Now click
        - code [ref=e66]: Save
        - text: ", and then click"
        - code [ref=e67]: Activate
        - text: to activate the VPN, and you should be connected.
