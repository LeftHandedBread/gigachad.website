  - main [ref=e15]:
    - generic [ref=e16]:
      - heading "About" [level=2] [ref=e17]
      - paragraph [ref=e18]:
        - text: We use VPNs in the way they were originally intended. Connecting computers across the web into one single network where we do what we want, the way we want to do it.
        - text: No public IP? No control over your home network? No problem. Share files across the network from anywhere, to anywhere. Forward a port to host a server. Get access to VPN exclusive databases. We don't mess around. Help us build an intranet fit for only the giga-est of chads.
    - generic [ref=e19]:
      - heading "Join" [level=2] [ref=e20]
      - paragraph [ref=e21]: The VPN is invite only. Contact Bread or Carson to request to join.
    - separator [ref=e22]
    - generic [ref=e23]:
      - heading "Client Setup (Linux)" [level=2] [ref=e24]
      - paragraph [ref=e25]:
        - text: First,
        - link "Download WireGuard" [ref=e26] [cursor=pointer]:
          - /url: https://www.wireguard.com
        - text: for your Linux environment.
      - paragraph [ref=e27]:
        - text: Second, Enable IP Forwarding in the text file
        - code [ref=e28]: /etc/sysctl.conf
        - text: ", by removing the comment on line 28:"
        - code [ref=e29]: "#net.ipv4.ip_forward = 1"
        - strong [ref=e30]: â†’
        - code [ref=e31]: net.ipv4.ip_forward = 1
      - paragraph [ref=e32]:
        - text: "You can also do this for IPv6 on line 33, if you want, which we may support in the future, but don't currently:"
        - code [ref=e33]: "#net.ipv6.ip_forward = 1"
        - strong [ref=e34]: â†’
        - code [ref=e35]: net.ipv6.ip_forward = 1
      - paragraph [ref=e36]:
        - text: Third, generate a key pair to use. You will put your private key on line 2 in the
        - code [ref=e37]: /etc/wireguard/wg0.conf
        - text: file, and the public one you will give to Bread or Carson.
        - code [ref=e38]: wg genkey > server-private-key
        - text: // Generate Private Key
        - code [ref=e39]: wg pubkey < server-private-key > server-public-key
        - text: // Generate Public Key from Private Key
        - text: This will generate a key pair, and store them in text files. You can use
        - code [ref=e40]: cat
        - text: "to view them:"
        - code [ref=e41]: cat server-private-key
        - text: // Keep this secret.
        - code [ref=e42]: cat server-public-key
        - text: // Give this to Bread or Carson
      - paragraph [ref=e43]:
        - text: Now, you can make a configuration file at
        - code [ref=e44]: /etc/wireguard/wg0.conf
        - text: ", and fill it with the following:"
      - strong [ref=e45]: /etc/wireguard/wg0.conf
      - generic [ref=e46]: "[Interface] PrivateKey = # (Your Private Key) Address = 10.0.0.X/32 # Where \"X\" = Address given by Bread or Carson DNS = 10.0.0.1 # Use Gigachad DNS (optional) [Peer] PublicKey = y8+He4nBEAiVcjsxzP70qwfgJlkcs7g8LcWWQfi6nEE= AllowedIPs = 0.0.0.0/1, 128.0.0.0/1 Endpoint = 192.3.251.174:51820 PersistentKeepalive = 20"
      - paragraph [ref=e47]:
        - text: "Assuming you use systemd, you can start WireGuard with this command:"
        - code [ref=e48]: systemctl start wg-quick@wg0
        - text: "And you can stop it with this command:"
        - code [ref=e49]: systemctl stop wg-quick@wg0
        - text: "If you want WireGuard to start automatically on PC startup, create a system link:"
        - code [ref=e50]: systemctl enable wg-quick@wg0.conf
      - paragraph [ref=e51]: And that's it. Your VPN should be up and running.
    - separator [ref=e52]
    - generic [ref=e53]:
